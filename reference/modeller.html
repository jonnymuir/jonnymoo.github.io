document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l(\"1d7f0f7d-b0ae-4caf-ad99-a745bb0f0257\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"07a59636-8b28-41bc-b326-82cd52098da0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3d2c15ff-0f4a-4b17-843c-319ba26dd45c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"1d7f0f7d-b0ae-4caf-ad99-a745bb0f0257\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"07a59636-8b28-41bc-b326-82cd52098da0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"3d2c15ff-0f4a-4b17-843c-319ba26dd45c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin: 0; background: #f4f3ee; font-family: 'Public Sans', 'Helvetica Neue', Arial, sans-serif; color: #20302f; }\n  a { color: #12525a; } a:hover { color: #0d3b41; }\n  input[type=\"range\"] { accent-color: #12525a; width: 100%; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; display: flex; flex-direction: column;\">\n\n  <!-- ================= HEADER ================= -->\n  <header data-screen-label=\"Portal header\" style=\"background: #0d3b41; color: #f4f3ee;\">\n    <div style=\"max-width: 1140px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 16px;\">\n      <div style=\"width: 92px; height: 34px; border: 1px dashed rgba(244,243,238,0.5); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.08em; color: rgba(244,243,238,0.7);\">SCHEME LOGO<\u002Fdiv>\n      <div style=\"font-size: 17px; font-weight: 700; letter-spacing: -0.01em;\">My Pension<\u002Fdiv>\n      <div style=\"flex: 1;\"><\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 10px; font-size: 13px;\">\n        <div style=\"width: 30px; height: 30px; border-radius: 50%; background: #c08b2d; color: #0d3b41; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px;\">{{ memberInitials }}<\u002Fdiv>\n        <div>\n          <div style=\"font-weight: 600; line-height: 1.2;\">{{ memberName }}<\u002Fdiv>\n          <div style=\"font-size: 11px; color: rgba(244,243,238,0.65); line-height: 1.2;\">{{ memberTypeLabel }} · Logged in<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ================= TAB NAV ================= -->\n  <nav style=\"background: #ffffff; border-bottom: 1px solid #e2e0d8;\">\n    <div style=\"max-width: 1140px; margin: 0 auto; padding: 0 24px; display: flex; gap: 4px;\">\n      <button onclick=\"{{ goOverview }}\" style=\"{{ tabOverviewStyle }}\">Overview<\u002Fbutton>\n      <button onclick=\"{{ goCalc }}\" style=\"{{ tabCalcStyle }}\">Benefit calculator<\u002Fbutton>\n      <button onclick=\"{{ goPay }}\" style=\"{{ tabPayStyle }}\">Contributions &amp; paying more<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <main style=\"flex: 1; width: 100%; max-width: 1140px; margin: 0 auto; padding: 28px 24px 48px; box-sizing: border-box;\">\n\n  <!-- ================= OVERVIEW ================= -->\n  <sc-if value=\"{{ tabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n    <section data-screen-label=\"Overview\">\n      <h1 style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px;\">Your pension today<\u002Fh1>\n      <p style=\"margin: 0 0 24px; font-size: 14px; color: #5a6866;\">Values as at 31 March 2026, from your latest Annual Member Statement.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px;\">\n        <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 22px;\">\n          <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #12525a; margin-bottom: 12px;\">Retirement Income Builder (DB)<\u002Fdiv>\n          <div style=\"font-size: 32px; font-weight: 800; letter-spacing: -0.02em;\">{{ accPensionD }}<span style=\"font-size: 14px; font-weight: 500; color: #5a6866;\"> a year<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top: 8px; font-size: 14px; color: #38504e;\">plus a one-off lump sum of <strong>{{ accLumpD }}<\u002Fstrong><\u002Fdiv>\n          <div style=\"margin-top: 12px; font-size: 12px; color: #8a948f;\">Pension built up so far, payable from age 66.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasDC }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 22px;\">\n            <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #12525a; margin-bottom: 12px;\">Investment Builder (DC)<\u002Fdiv>\n            <div style=\"font-size: 32px; font-weight: 800; letter-spacing: -0.02em;\">{{ dcPotD }}<\u002Fdiv>\n            <div style=\"margin-top: 8px; font-size: 14px; color: #38504e;\">Current pot value<\u002Fdiv>\n            <div style=\"margin-top: 12px; font-size: 12px; color: #8a948f;\">Flexible savings you can take as cash, income or both.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background: #12525a; color: #f4f3ee; border-radius: 10px; padding: 22px; display: flex; flex-direction: column;\">\n          <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #d4b06a; margin-bottom: 12px;\">If you retire at 66<\u002Fdiv>\n          <div style=\"font-size: 32px; font-weight: 800; letter-spacing: -0.02em;\">{{ teaserIncomeD }}<span style=\"font-size: 14px; font-weight: 500; color: rgba(244,243,238,0.7);\"> a year<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top: 8px; font-size: 13px; color: rgba(244,243,238,0.8);\">Estimated total yearly retirement income, in today's money.<\u002Fdiv>\n          <div style=\"flex: 1;\"><\u002Fdiv>\n          <button onclick=\"{{ startModelling }}\" style=\"margin-top: 18px; align-self: flex-start; background: #c08b2d; color: #0d3b41; border: none; border-radius: 6px; padding: 11px 18px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;\">Model your benefits<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showAA }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top: 20px; background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 16px 22px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;\">\n          <div style=\"flex: 1; min-width: 240px;\">\n            <div style=\"font-size: 13px; font-weight: 700;\">Annual Allowance<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #5a6866;\">You've used an estimated <strong>{{ aaUsedD }}<\u002Fstrong> of this year's £60,000 allowance.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex: 1; min-width: 200px; height: 8px; background: #eceae2; border-radius: 4px; overflow: hidden;\">\n            <div style=\"height: 100%; background: {{ aaBarColor }}; width: {{ aaPct }}%;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ================= BENEFIT CALCULATOR ================= -->\n  <sc-if value=\"{{ tabCalc }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Benefit calculator\">\n\n      <!-- Stage: choose starting point -->\n      <sc-if value=\"{{ stageStart }}\" hint-placeholder-val=\"{{ true }}\">\n        <h1 style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px;\">Benefit calculator<\u002Fh1>\n        <p style=\"margin: 0 0 24px; font-size: 14px; color: #5a6866; max-width: 640px;\">See what your benefits could be worth, explore your options for taking them, and model changes like retiring earlier or saving more.<\u002Fp>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; max-width: 760px;\">\n          <button onclick=\"{{ startModelling }}\" style=\"text-align: left; background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 24px; cursor: pointer; font-family: inherit;\" style-hover=\"border-color: #12525a;\">\n            <div style=\"font-size: 17px; font-weight: 700; color: #12525a; margin-bottom: 8px;\">Use your current record<\u002Fdiv>\n            <div style=\"font-size: 13.5px; color: #5a6866; line-height: 1.5;\">Start from the benefits you've built up so far. We'll project forward using standard assumptions, which you can change.<\u002Fdiv>\n            <div style=\"margin-top: 14px; font-size: 13px; font-weight: 700; color: #c08b2d;\">Start modelling →<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ goQuoteEntry }}\" style=\"text-align: left; background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 24px; cursor: pointer; font-family: inherit;\" style-hover=\"border-color: #12525a;\">\n            <div style=\"font-size: 17px; font-weight: 700; color: #12525a; margin-bottom: 8px;\">Use your retirement quote<\u002Fdiv>\n            <div style=\"font-size: 13.5px; color: #5a6866; line-height: 1.5;\">If we've sent you a retirement quote, enter its figures to explore your options with exact numbers.<\u002Fdiv>\n            <div style=\"margin-top: 14px; font-size: 13px; font-weight: 700; color: #c08b2d;\">Enter quote figures →<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Stage: quote entry -->\n      <sc-if value=\"{{ stageQuote }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ backToStart }}\" style=\"background: none; border: none; padding: 0; font-family: inherit; font-size: 13px; color: #12525a; cursor: pointer; margin-bottom: 16px;\">← Back<\u002Fbutton>\n        <h1 style=\"font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px;\">Enter your retirement quote<\u002Fh1>\n        <p style=\"margin: 0 0 22px; font-size: 14px; color: #5a6866; max-width: 560px;\">Copy the figures from the quote we sent you. You'll find them on the first page, under \"Your benefits\".<\u002Fp>\n        <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 24px; max-width: 480px; display: flex; flex-direction: column; gap: 16px;\">\n          <label style=\"display: block;\">\n            <div style=\"font-size: 13px; font-weight: 600; margin-bottom: 6px;\">Yearly pension on your quote (£)<\u002Fdiv>\n            <input type=\"number\" value=\"{{ qPension }}\" onchange=\"{{ onQPension }}\" placeholder=\"e.g. 18500\" style=\"width: 100%; box-sizing: border-box; border: 1px solid #c9c6ba; border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 15px;\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <div style=\"font-size: 13px; font-weight: 600; margin-bottom: 6px;\">Lump sum on your quote (£)<\u002Fdiv>\n            <input type=\"number\" value=\"{{ qLump }}\" onchange=\"{{ onQLump }}\" placeholder=\"e.g. 55500\" style=\"width: 100%; box-sizing: border-box; border: 1px solid #c9c6ba; border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 15px;\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <div style=\"font-size: 13px; font-weight: 600; margin-bottom: 6px;\">Investment Builder value on your quote (£) — leave blank if none<\u002Fdiv>\n            <input type=\"number\" value=\"{{ qDC }}\" onchange=\"{{ onQDC }}\" placeholder=\"e.g. 48000\" style=\"width: 100%; box-sizing: border-box; border: 1px solid #c9c6ba; border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 15px;\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <div style=\"font-size: 13px; font-weight: 600; margin-bottom: 6px;\">Retirement age on your quote<\u002Fdiv>\n            <input type=\"number\" value=\"{{ qAge }}\" onchange=\"{{ onQAge }}\" min=\"55\" max=\"75\" style=\"width: 120px; border: 1px solid #c9c6ba; border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 15px;\">\n          <\u002Flabel>\n          <button onclick=\"{{ applyQuote }}\" style=\"align-self: flex-start; background: #12525a; color: #f4f3ee; border: none; border-radius: 6px; padding: 12px 20px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;\">Use these figures<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Stage: modeller -->\n      <sc-if value=\"{{ stageModel }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 4px;\">\n          <h1 style=\"font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 0;\">Model your benefits<\u002Fh1>\n          <sc-if value=\"{{ quoteMode }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-size: 12px; font-weight: 700; background: #c08b2d; color: #0d3b41; border-radius: 4px; padding: 3px 8px;\">Using your retirement quote<\u002Fspan>\n            <button onclick=\"{{ clearQuote }}\" style=\"background: none; border: none; padding: 0; font-family: inherit; font-size: 12px; color: #12525a; cursor: pointer; text-decoration: underline;\">clear<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <p style=\"margin: 0 0 20px; font-size: 13.5px; color: #5a6866;\">{{ modelSubtitle }}<\u002Fp>\n\n        <div style=\"display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;\">\n\n          <!-- Controls column -->\n          <div style=\"flex: 1 1 300px; min-width: 290px; max-width: 380px; display: flex; flex-direction: column; gap: 16px;\">\n\n            <sc-if value=\"{{ showAgeSlider }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 20px;\">\n                <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px;\">\n                  <div style=\"font-size: 14px; font-weight: 700;\">When do you want to retire?<\u002Fdiv>\n                  <div style=\"font-size: 22px; font-weight: 800; color: #12525a;\">{{ retireAge }}<\u002Fdiv>\n                <\u002Fdiv>\n                <input type=\"range\" min=\"{{ ageMin }}\" max=\"75\" step=\"1\" value=\"{{ retireAge }}\" onchange=\"{{ onRetireAge }}\">\n                <div style=\"display: flex; justify-content: space-between; font-size: 11px; color: #8a948f; margin-top: 4px;\"><span>{{ ageMin }}<\u002Fspan><span>Normal Pension Age 66<\u002Fspan><span>75<\u002Fspan><\u002Fdiv>\n                <sc-if value=\"{{ earlyNote }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top: 12px; font-size: 12.5px; color: #8a5a12; background: #faf3e3; border-radius: 6px; padding: 9px 12px;\">Retiring before 66 reduces your DB pension, because it's paid for longer.<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Benefit options -->\n            <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 20px;\">\n              <div style=\"font-size: 14px; font-weight: 700; margin-bottom: 4px;\">How do you want to take your benefits?<\u002Fdiv>\n              <div style=\"font-size: 12px; color: #8a948f; margin-bottom: 14px;\">You can change your mind any time before you retire.<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <button onclick=\"{{ setOptStandard }}\" style=\"{{ optStdStyle }}\">\n                  <div style=\"font-size: 13.5px; font-weight: 700;\">Standard benefits<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #5a6866; margin-top: 3px;\">Your pension plus the standard tax-free lump sum.{{ optStdDcNote }}<\u002Fdiv>\n                <\u002Fbutton>\n                <button onclick=\"{{ setOptMaxTFC }}\" style=\"{{ optTfcStyle }}\">\n                  <div style=\"font-size: 13.5px; font-weight: 700;\">Maximum tax-free cash<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #5a6866; margin-top: 3px;\">Take the biggest tax-free lump sum allowed (25% of the value of your benefits), in exchange for some pension{{ optTfcDcNote }}.<\u002Fdiv>\n                <\u002Fbutton>\n                <sc-if value=\"{{ hasDCAtRet }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button onclick=\"{{ setOptDcCash }}\" style=\"{{ optCashStyle }}\">\n                    <div style=\"font-size: 13.5px; font-weight: 700;\">Take your DC pot as cash<\u002Fdiv>\n                    <div style=\"font-size: 12px; color: #5a6866; margin-top: 3px;\">Keep your full DB pension and take the whole Investment Builder pot as a one-off payment (part may be taxed).<\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Assumptions -->\n            <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px;\">\n              <button onclick=\"{{ toggleAssump }}\" style=\"width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; background: none; border: none; padding: 16px 20px; font-family: inherit; cursor: pointer;\">\n                <span style=\"font-size: 14px; font-weight: 700; color: #20302f;\">Assumptions<\u002Fspan>\n                <span style=\"font-size: 12px; color: #12525a; font-weight: 600;\">{{ assumpToggleLabel }}<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ assumpOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding: 0 20px 20px; display: flex; flex-direction: column; gap: 16px; border-top: 1px solid #eceae2;\">\n                  <div style=\"padding-top: 16px;\">\n                    <div style=\"display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;\"><span style=\"font-weight: 600;\">Inflation (CPI)<\u002Fspan><span style=\"color: #12525a; font-weight: 700;\">{{ inflation }}%<\u002Fspan><\u002Fdiv>\n                    <input type=\"range\" min=\"0\" max=\"5\" step=\"0.5\" value=\"{{ inflation }}\" onchange=\"{{ onInflation }}\">\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ isActive }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div>\n                      <div style=\"display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;\"><span style=\"font-weight: 600;\">Yearly salary growth<\u002Fspan><span style=\"color: #12525a; font-weight: 700;\">{{ salaryGrowth }}%<\u002Fspan><\u002Fdiv>\n                      <input type=\"range\" min=\"0\" max=\"6\" step=\"0.5\" value=\"{{ salaryGrowth }}\" onchange=\"{{ onSalaryGrowth }}\">\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ hasDC }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div>\n                      <div style=\"display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;\"><span style=\"font-weight: 600;\">Investment return<\u002Fspan><span style=\"color: #12525a; font-weight: 700;\">{{ invReturn }}%<\u002Fspan><\u002Fdiv>\n                      <input type=\"range\" min=\"0\" max=\"8\" step=\"0.5\" value=\"{{ invReturn }}\" onchange=\"{{ onInvReturn }}\">\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div>\n                    <div style=\"font-size: 13px; font-weight: 600; margin-bottom: 8px;\">Show amounts in<\u002Fdiv>\n                    <div style=\"display: flex; border: 1px solid #c9c6ba; border-radius: 6px; overflow: hidden;\">\n                      <button onclick=\"{{ setTodays }}\" style=\"{{ todaysBtnStyle }}\">Today's money<\u002Fbutton>\n                      <button onclick=\"{{ setFuture }}\" style=\"{{ futureBtnStyle }}\">Future money<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ resetAssump }}\" style=\"align-self: flex-start; background: none; border: none; padding: 0; font-family: inherit; font-size: 12px; color: #12525a; text-decoration: underline; cursor: pointer;\">Reset to standard assumptions<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ compareOn }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ saveScenario }}\" style=\"background: #ffffff; border: 1px dashed #12525a; color: #12525a; border-radius: 8px; padding: 12px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;\">{{ saveBtnLabel }}<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- Results column -->\n          <div style=\"flex: 2 1 420px; min-width: 300px; display: flex; flex-direction: column; gap: 16px;\">\n\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px;\">\n              <div style=\"background: #12525a; color: #f4f3ee; border-radius: 10px; padding: 16px 18px;\">\n                <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #d4b06a;\">DB pension<\u002Fdiv>\n                <div style=\"font-size: 24px; font-weight: 800; margin-top: 6px;\">{{ resPensionD }}<\u002Fdiv>\n                <div style=\"font-size: 11.5px; color: rgba(244,243,238,0.7);\">a year, for life<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 16px 18px;\">\n                <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #12525a;\">{{ cashLabel }}<\u002Fdiv>\n                <div style=\"font-size: 24px; font-weight: 800; margin-top: 6px;\">{{ resCashD }}<\u002Fdiv>\n                <div style=\"font-size: 11.5px; color: #8a948f;\">one-off payment<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ showDcIncomeCard }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 16px 18px;\">\n                  <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #12525a;\">DC income<\u002Fdiv>\n                  <div style=\"font-size: 24px; font-weight: 800; margin-top: 6px;\">{{ resDcIncomeD }}<\u002Fdiv>\n                  <div style=\"font-size: 11.5px; color: #8a948f;\">a year, over 20 years<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 16px 18px;\">\n                <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #12525a;\">Total income<\u002Fdiv>\n                <div style=\"font-size: 24px; font-weight: 800; margin-top: 6px;\">{{ resTotalD }}<\u002Fdiv>\n                <div style=\"font-size: 11.5px; color: #8a948f;\">a year at {{ retireAge }}, incl. State Pension from 68<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Chart -->\n            <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 20px;\">\n              <div style=\"display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;\">\n                <div style=\"font-size: 14px; font-weight: 700;\">Your yearly income, age {{ retireAge }} to 90<\u002Fdiv>\n                <div style=\"display: flex; gap: 14px; font-size: 11.5px; color: #5a6866;\">\n                  <span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 10px; height: 10px; border-radius: 2px; background: #12525a;\"><\u002Fspan>DB pension<\u002Fspan>\n                  <sc-if value=\"{{ hasDCAtRet }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 10px; height: 10px; border-radius: 2px; background: #7aa9ae;\"><\u002Fspan>DC drawdown<\u002Fspan><\u002Fsc-if>\n                  <span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 10px; height: 10px; border-radius: 2px; background: #d4b06a;\"><\u002Fspan>State Pension<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display: flex; align-items: flex-end; gap: 2px; height: 170px;\">\n                <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"24\">\n                  <div title=\"Age {{ bar.age }}: {{ bar.totalD }}\" style=\"flex: 1; display: flex; flex-direction: column-reverse; height: 170px;\">\n                    <div style=\"height: {{ bar.dbH }}px; background: #12525a; border-radius: 1px;\"><\u002Fdiv>\n                    <div style=\"height: {{ bar.dcH }}px; background: #7aa9ae; border-radius: 1px;\"><\u002Fdiv>\n                    <div style=\"height: {{ bar.spH }}px; background: #d4b06a; border-radius: 1px 1px 0 0;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 2px; margin-top: 6px;\">\n                <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"24\">\n                  <div style=\"flex: 1; text-align: center; font-size: 10px; color: #8a948f;\">{{ bar.label }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Compare strip -->\n            <sc-if value=\"{{ hasSaved }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background: #faf3e3; border: 1px solid #e6d4a8; border-radius: 10px; padding: 16px 20px;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;\">\n                  <div style=\"font-size: 13px; font-weight: 700;\">Comparing scenarios<\u002Fdiv>\n                  <button onclick=\"{{ clearSaved }}\" style=\"background: none; border: none; padding: 0; font-family: inherit; font-size: 12px; color: #12525a; text-decoration: underline; cursor: pointer;\">Remove<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 13px;\">\n                  <div>\n                    <div style=\"font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #8a5a12; margin-bottom: 6px;\">Saved — {{ saved.title }}<\u002Fdiv>\n                    <div>Pension: <strong>{{ saved.pension }}<\u002Fstrong><\u002Fdiv>\n                    <div>Cash: <strong>{{ saved.cash }}<\u002Fstrong><\u002Fdiv>\n                    <div>Total income: <strong>{{ saved.total }}<\u002Fstrong><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #12525a; margin-bottom: 6px;\">Current — {{ currentTitle }}<\u002Fdiv>\n                    <div>Pension: <strong>{{ resPensionD }}<\u002Fstrong><\u002Fdiv>\n                    <div>Cash: <strong>{{ resCashD }}<\u002Fstrong><\u002Fdiv>\n                    <div>Total income: <strong>{{ resTotalD }}<\u002Fstrong><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ================= PAYING MORE ================= -->\n  <sc-if value=\"{{ tabPay }}\" hint-placeholder-val=\"{{ false }}\">\n    <section data-screen-label=\"Contributions and paying more\">\n      <h1 style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px;\">Contributions &amp; paying more<\u002Fh1>\n\n      <sc-if value=\"{{ isDeferred }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top: 16px; background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 24px; max-width: 560px; font-size: 14px; color: #38504e; line-height: 1.6;\">\n          As a deferred member you're no longer paying contributions. Your Retirement Income Builder pension is revalued each year, and any Investment Builder savings stay invested until you take them. Use the <strong>Benefit calculator<\u002Fstrong> to see what they could be worth.\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isActive }}\" hint-placeholder-val=\"{{ true }}\">\n        <p style=\"margin: 0 0 24px; font-size: 14px; color: #5a6866;\">Based on your salary of {{ salaryD }} a year.<\u002Fp>\n\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; max-width: 800px;\">\n          <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 20px;\">\n            <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #12525a;\">You pay<\u002Fdiv>\n            <div style=\"font-size: 26px; font-weight: 800; margin-top: 8px;\">{{ memberMonthlyD }}<span style=\"font-size: 13px; font-weight: 500; color: #8a948f;\"> /month<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size: 12.5px; color: #5a6866; margin-top: 6px;\">6.1% of salary — but with {{ taxReliefD }} tax relief it really costs you <strong>{{ netCostD }}<\u002Fstrong>.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 20px;\">\n            <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #12525a;\">Your employer pays<\u002Fdiv>\n            <div style=\"font-size: 26px; font-weight: 800; margin-top: 8px;\">{{ employerMonthlyD }}<span style=\"font-size: 13px; font-weight: 500; color: #8a948f;\"> /month<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size: 12.5px; color: #5a6866; margin-top: 6px;\">14.5% of salary, on top of your own contributions.<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ aboveThreshold }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 20px;\">\n              <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #12525a;\">Into your DC pot<\u002Fdiv>\n              <div style=\"font-size: 26px; font-weight: 800; margin-top: 8px;\">{{ dcAutoMonthlyD }}<span style=\"font-size: 13px; font-weight: 500; color: #8a948f;\"> /month<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size: 12.5px; color: #5a6866; margin-top: 6px;\">Contributions on your salary above the £74,208 threshold go to the Investment Builder automatically.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 20px; background: #ffffff; border: 1px solid #e2e0d8; border-radius: 10px; padding: 24px; max-width: 800px;\">\n          <div style=\"font-size: 15px; font-weight: 700; margin-bottom: 4px;\">What if you paid more?<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #5a6866; margin-bottom: 18px;\">Additional contributions go into your Investment Builder pot and get tax relief too.<\u002Fdiv>\n          <div style=\"display: flex; gap: 28px; align-items: center; flex-wrap: wrap;\">\n            <div style=\"flex: 1 1 280px;\">\n              <div style=\"display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;\"><span style=\"font-weight: 600;\">Extra monthly contribution<\u002Fspan><span style=\"font-size: 18px; font-weight: 800; color: #12525a;\">{{ avcD }}<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"0\" max=\"1500\" step=\"25\" value=\"{{ avc }}\" onchange=\"{{ onAvc }}\">\n              <div style=\"display: flex; justify-content: space-between; font-size: 11px; color: #8a948f; margin-top: 4px;\"><span>£0<\u002Fspan><span>£1,500<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex: 1 1 220px; background: #f4f3ee; border-radius: 8px; padding: 16px 18px;\">\n              <div style=\"font-size: 12px; color: #5a6866;\">Could add to your pot by 66<\u002Fdiv>\n              <div style=\"font-size: 26px; font-weight: 800; color: #12525a; margin-top: 4px;\">{{ avcBoostD }}<\u002Fdiv>\n              <div style=\"font-size: 11.5px; color: #8a948f; margin-top: 4px;\">In today's money, at your chosen assumptions. Reflected live in the Benefit calculator.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showAA }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top: 20px; background: {{ aaCardBg }}; border: 1px solid {{ aaCardBorder }}; border-radius: 10px; padding: 16px 22px; max-width: 800px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;\">\n            <div style=\"flex: 1; min-width: 240px;\">\n              <div style=\"font-size: 13px; font-weight: 700;\">Annual Allowance check<\u002Fdiv>\n              <div style=\"font-size: 13px; color: #5a6866;\">{{ aaMessage }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex: 1; min-width: 200px; height: 8px; background: rgba(0,0,0,0.07); border-radius: 4px; overflow: hidden;\">\n              <div style=\"height: 100%; background: {{ aaBarColor }}; width: {{ aaPct }}%;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"border-top: 1px solid #e2e0d8; background: #ffffff;\">\n    <div style=\"max-width: 1140px; margin: 0 auto; padding: 18px 24px; font-size: 11.5px; color: #8a948f; line-height: 1.6;\">\n      Figures are estimates for illustration only, based on the assumptions shown, and aren't a promise of what you'll get. They don't allow for tax charges that may apply. Before making decisions, get a formal quote or consider taking financial advice.\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;memberType&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Active (DB + DC)&quot;, &quot;Active (DB only)&quot;, &quot;Deferred&quot;], &quot;default&quot;: &quot;Active (DB + DC)&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Demo scenario&quot;}, &quot;compareScenarios&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Features&quot;}, &quot;showAnnualAllowance&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Features&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'overview',\n    stage: 'start',\n    retireAge: 66,\n    option: 'standard',\n    assumpOpen: false,\n    todays: true,\n    inflation: 2.5,\n    invReturn: 5,\n    salaryGrowth: 3,\n    avc: 0,\n    saved: null,\n    quoteMode: false,\n    q: { pension: '', lump: '', dc: '', age: 66 }\n  };\n\n  profile() {\n    const t = this.props.memberType ?? 'Active (DB + DC)';\n    if (t === 'Deferred') {\n      return { key: 'deferred', name: 'Prof Anne Whitfield', initials: 'AW', label: 'Deferred member', age: 54, salary: 0, accP: 9600, accL: 28800, dc: 21000, active: false };\n    }\n    if (t === 'Active (DB only)') {\n      return { key: 'activeDB', name: 'James Okafor', initials: 'JO', label: 'Active member', age: 39, salary: 46000, accP: 7800, accL: 23400, dc: 0, active: true };\n    }\n    return { key: 'activeDC', name: 'Dr Sarah Mitchell', initials: 'SM', label: 'Active member', age: 47, salary: 82000, accP: 16400, accL: 49200, dc: 48300, active: true };\n  }\n\n  fmt(n) {\n    const v = Math.round(n);\n    return '£' + Math.abs(v).toLocaleString('en-GB') * (v < 0 ? -1 : 1);\n  }\n\n  fm(n) { return '£' + Math.round(n).toLocaleString('en-GB'); }\n\n  compute(retireAge, option) {\n    const s = this.state, p = this.profile();\n    const THRESH = 74208, NPA = 66, SP = 11975;\n    const qm = s.quoteMode;\n    const age = p.age;\n    const years = Math.max(0, retireAge - age);\n    const realG = (s.salaryGrowth - s.inflation) / 100;\n    const realR = (s.invReturn - s.inflation) / 100;\n\n    let baseP, baseL, pot;\n    if (qm) {\n      baseP = parseFloat(s.q.pension) || 0;\n      baseL = parseFloat(s.q.lump) || 0;\n      pot = parseFloat(s.q.dc) || 0;\n    } else {\n      const futureP = p.active ? years * (Math.min(p.salary, THRESH) / 75) * Math.pow(1 + Math.max(realG, -0.05), years / 2) : 0;\n      baseP = p.accP + futureP;\n      baseL = p.accL + 3 * futureP;\n      const annualDC = p.active ? Math.max(0, p.salary - THRESH) * 0.2 + s.avc * 12 : 0;\n      const grow = Math.pow(1 + realR, years);\n      pot = p.dc * grow + (Math.abs(realR) > 0.0001 ? annualDC * ((grow - 1) / realR) : annualDC * years);\n    }\n\n    // Early/late retirement factors on DB (not applied in quote mode — quote is age-specific)\n    let P = baseP, L = baseL;\n    if (!qm) {\n      if (retireAge < NPA) {\n        P *= Math.max(0.4, 1 - 0.04 * (NPA - retireAge));\n        L *= Math.max(0.5, 1 - 0.025 * (NPA - retireAge));\n      } else if (retireAge > NPA) {\n        P *= 1 + 0.03 * (Math.min(retireAge, 75) - NPA);\n      }\n    }\n\n    // Future money factor\n    const f = s.todays ? 1 : Math.pow(1 + s.inflation / 100, years);\n    P *= f; L *= f; pot *= f;\n\n    // Options\n    const totalValue = 20 * P + L + pot;\n    const maxTFC = 0.25 * totalValue;\n    let pension = P, cash = L, dcRem = pot, cashLabel = 'Tax-free cash';\n    if (option === 'maxTFC') {\n      const extra = Math.max(0, maxTFC - L);\n      const fromDC = Math.min(pot, extra);\n      const shortfall = extra - fromDC;\n      pension = Math.max(0, P - shortfall / 12);\n      cash = maxTFC;\n      dcRem = pot - fromDC;\n    } else if (option === 'dcCash') {\n      cash = L + pot;\n      dcRem = 0;\n      cashLabel = 'One-off cash';\n    }\n    const dcIncome = dcRem / 20;\n    const spNow = retireAge >= 68 ? SP * f : 0;\n    const total = pension + dcIncome + (retireAge >= 68 ? SP * f : SP * f * 0); // at retirement age\n\n    return { P, L, pot, pension, cash, dcRem, dcIncome, cashLabel, total: pension + dcIncome + (retireAge >= 68 ? SP * f : 0), f, SP, years, maxTFC };\n  }\n\n  optStyle(active) {\n    return {\n      textAlign: 'left', fontFamily: 'inherit', cursor: 'pointer', borderRadius: '8px', padding: '12px 14px', width: '100%', boxSizing: 'border-box',\n      background: active ? '#eef4f4' : '#ffffff',\n      border: active ? '2px solid #12525a' : '1px solid #d8d5ca',\n      margin: active ? '0' : '1px', color: '#20302f'\n    };\n  }\n\n  tabStyle(active) {\n    return {\n      fontFamily: 'inherit', fontSize: '14px', fontWeight: active ? 700 : 500, cursor: 'pointer',\n      background: 'none', border: 'none', padding: '15px 16px 13px',\n      color: active ? '#12525a' : '#5a6866',\n      borderBottom: active ? '3px solid #c08b2d' : '3px solid transparent'\n    };\n  }\n\n  segStyle(active) {\n    return {\n      flex: 1, fontFamily: 'inherit', fontSize: '12.5px', fontWeight: 600, cursor: 'pointer', padding: '9px 6px', border: 'none',\n      background: active ? '#12525a' : '#ffffff', color: active ? '#f4f3ee' : '#5a6866'\n    };\n  }\n\n  renderVals() {\n    const s = this.state, p = this.profile();\n    const compareOn = this.props.compareScenarios ?? true;\n    const showAA = (this.props.showAnnualAllowance ?? true) && p.active;\n    const ra = s.quoteMode ? (parseInt(s.q.age) || 66) : s.retireAge;\n    const r = this.compute(ra, s.option);\n    const teaser = this.compute(66, 'standard');\n\n    // Chart bars\n    const barsRaw = [];\n    for (let a = ra; a <= 90; a++) {\n      const db = r.pension;\n      const dc = a < ra + 20 ? r.dcIncome : 0;\n      const sp = a >= 68 ? r.SP * r.f : 0;\n      barsRaw.push({ age: a, db, dc, sp, total: db + dc + sp });\n    }\n    const maxI = Math.max(1, ...barsRaw.map(b => b.total));\n    const H = 168;\n    const bars = barsRaw.map(b => ({\n      age: b.age,\n      dbH: Math.round(b.db / maxI * H),\n      dcH: Math.round(b.dc / maxI * H),\n      spH: Math.round(b.sp / maxI * H),\n      totalD: this.fm(b.total) + ' a year',\n      label: b.age % 5 === 0 ? String(b.age) : ''\n    }));\n\n    // Paying more\n    const THRESH = 74208;\n    const memberMonthly = p.salary * 0.061 / 12;\n    const reliefRate = p.salary > 50270 ? 0.4 : 0.2;\n    const employerMonthly = p.salary * 0.145 / 12;\n    const dcAutoMonthly = Math.max(0, p.salary - THRESH) * 0.2 / 12;\n    const nToNPA = Math.max(1, 66 - p.age);\n    const realR = (s.invReturn - s.inflation) / 100;\n    const growN = Math.pow(1 + realR, nToNPA);\n    const avcBoost = Math.abs(realR) > 0.0001 ? s.avc * 12 * ((growN - 1) / realR) : s.avc * 12 * nToNPA;\n\n    // Annual Allowance (rough): DB input = pension accrued this year x 16 + lump accrual, + DC contributions\n    const yearAccrual = Math.min(p.salary, THRESH) / 75;\n    const aaUsed = p.active ? yearAccrual * 16 + yearAccrual * 3 + Math.max(0, p.salary - THRESH) * 0.2 + s.avc * 12 : 0;\n    const aaPct = Math.min(100, aaUsed / 60000 * 100);\n    const aaOver = aaUsed > 60000;\n\n    const optionTitles = { standard: 'Standard benefits', maxTFC: 'Maximum tax-free cash', dcCash: 'DC pot as cash' };\n    const hasDCAtRet = r.pot > 500;\n\n    return {\n      // shell\n      memberName: p.name, memberInitials: p.initials, memberTypeLabel: p.label,\n      tabOverview: s.tab === 'overview', tabCalc: s.tab === 'calc', tabPay: s.tab === 'pay',\n      tabOverviewStyle: this.tabStyle(s.tab === 'overview'),\n      tabCalcStyle: this.tabStyle(s.tab === 'calc'),\n      tabPayStyle: this.tabStyle(s.tab === 'pay'),\n      goOverview: () => this.setState({ tab: 'overview' }),\n      goCalc: () => this.setState({ tab: 'calc' }),\n      goPay: () => this.setState({ tab: 'pay' }),\n\n      // overview\n      accPensionD: this.fm(p.accP), accLumpD: this.fm(p.accL), dcPotD: this.fm(p.dc),\n      hasDC: p.dc > 0 || (p.active && p.salary > THRESH),\n      teaserIncomeD: this.fm(teaser.total),\n      startModelling: () => this.setState({ tab: 'calc', stage: 'model', quoteMode: false }),\n\n      // calculator stages\n      stageStart: s.stage === 'start', stageQuote: s.stage === 'quote', stageModel: s.stage === 'model',\n      goQuoteEntry: () => this.setState({ tab: 'calc', stage: 'quote' }),\n      backToStart: () => this.setState({ stage: 'start' }),\n      quoteMode: s.quoteMode,\n      clearQuote: () => this.setState({ quoteMode: false }),\n      modelSubtitle: s.quoteMode\n        ? 'Exploring the options on your retirement quote at age ' + ra + '. All figures are before tax.'\n        : (s.todays ? 'All figures are in today\\u2019s money, before tax.' : 'All figures are in future money (not adjusted for inflation), before tax.'),\n\n      // quote form\n      qPension: s.q.pension, qLump: s.q.lump, qDC: s.q.dc, qAge: s.q.age,\n      onQPension: e => this.setState({ q: { ...s.q, pension: e.target.value } }),\n      onQLump: e => this.setState({ q: { ...s.q, lump: e.target.value } }),\n      onQDC: e => this.setState({ q: { ...s.q, dc: e.target.value } }),\n      onQAge: e => this.setState({ q: { ...s.q, age: e.target.value } }),\n      applyQuote: () => this.setState({ quoteMode: true, stage: 'model' }),\n\n      // controls\n      showAgeSlider: !s.quoteMode,\n      retireAge: ra,\n      ageMin: Math.max(55, p.age + 1),\n      onRetireAge: e => this.setState({ retireAge: parseInt(e.target.value) }),\n      earlyNote: !s.quoteMode && ra < 66,\n      isActive: p.active, isDeferred: !p.active,\n\n      // options\n      setOptStandard: () => this.setState({ option: 'standard' }),\n      setOptMaxTFC: () => this.setState({ option: 'maxTFC' }),\n      setOptDcCash: () => this.setState({ option: 'dcCash' }),\n      optStdStyle: this.optStyle(s.option === 'standard'),\n      optTfcStyle: this.optStyle(s.option === 'maxTFC'),\n      optCashStyle: this.optStyle(s.option === 'dcCash'),\n      optStdDcNote: hasDCAtRet ? ' Your DC pot provides a separate flexible income.' : '',\n      optTfcDcNote: hasDCAtRet ? ' or DC savings' : '',\n      hasDCAtRet,\n\n      // assumptions\n      assumpOpen: s.assumpOpen,\n      assumpToggleLabel: s.assumpOpen ? 'Hide' : 'Change',\n      toggleAssump: () => this.setState({ assumpOpen: !s.assumpOpen }),\n      inflation: s.inflation, invReturn: s.invReturn, salaryGrowth: s.salaryGrowth,\n      onInflation: e => this.setState({ inflation: parseFloat(e.target.value) }),\n      onInvReturn: e => this.setState({ invReturn: parseFloat(e.target.value) }),\n      onSalaryGrowth: e => this.setState({ salaryGrowth: parseFloat(e.target.value) }),\n      setTodays: () => this.setState({ todays: true }),\n      setFuture: () => this.setState({ todays: false }),\n      todaysBtnStyle: this.segStyle(s.todays),\n      futureBtnStyle: this.segStyle(!s.todays),\n      resetAssump: () => this.setState({ inflation: 2.5, invReturn: 5, salaryGrowth: 3 }),\n\n      // results\n      resPensionD: this.fm(r.pension),\n      resCashD: this.fm(r.cash),\n      cashLabel: r.cashLabel,\n      resDcIncomeD: this.fm(r.dcIncome),\n      showDcIncomeCard: s.option !== 'dcCash' && hasDCAtRet,\n      resTotalD: this.fm(r.total),\n      bars,\n\n      // compare\n      compareOn,\n      saveBtnLabel: s.saved ? 'Save current scenario instead' : '+ Save this scenario to compare',\n      saveScenario: () => this.setState({\n        saved: {\n          title: 'Retire at ' + ra + ', ' + optionTitles[s.option],\n          pension: this.fm(r.pension) + '/yr',\n          cash: this.fm(r.cash),\n          total: this.fm(r.total) + '/yr'\n        }\n      }),\n      hasSaved: !!s.saved,\n      saved: s.saved || { title: '', pension: '', cash: '', total: '' },\n      clearSaved: () => this.setState({ saved: null }),\n      currentTitle: 'Retire at ' + ra + ', ' + optionTitles[s.option],\n\n      // paying more\n      salaryD: this.fm(p.salary),\n      memberMonthlyD: this.fm(memberMonthly),\n      taxReliefD: Math.round(reliefRate * 100) + '%',\n      netCostD: this.fm(memberMonthly * (1 - reliefRate)),\n      employerMonthlyD: this.fm(employerMonthly),\n      aboveThreshold: p.salary > THRESH,\n      dcAutoMonthlyD: this.fm(dcAutoMonthly),\n      avc: s.avc,\n      avcD: this.fm(s.avc),\n      onAvc: e => this.setState({ avc: parseInt(e.target.value) }),\n      avcBoostD: '+' + this.fm(avcBoost),\n\n      // annual allowance\n      showAA,\n      aaUsedD: this.fm(aaUsed),\n      aaPct: Math.round(aaPct),\n      aaBarColor: aaOver ? '#b4452f' : '#12525a',\n      aaCardBg: aaOver ? '#faece8' : '#ffffff',\n      aaCardBorder: aaOver ? '#e0b3a6' : '#e2e0d8',\n      aaMessage: aaOver\n        ? 'Your estimated pension savings of ' + this.fm(aaUsed) + ' this year exceed the £60,000 Annual Allowance. A tax charge may apply — you can ask the scheme to pay it from your benefits.'\n        : 'You\\u2019ve used an estimated ' + this.fm(aaUsed) + ' of this year\\u2019s £60,000 allowance, including any extra contributions.'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
